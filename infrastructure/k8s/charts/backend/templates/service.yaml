apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "backend.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
