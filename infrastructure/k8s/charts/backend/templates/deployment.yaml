apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsetrak-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pulsetrak-backend
  template:
    metadata:
      labels:
        app: pulsetrak-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "{{ .Values.resources.requests.cpu }}"
              memory: "{{ .Values.resources.requests.memory }}"
