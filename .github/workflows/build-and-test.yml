name: Build and Test

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install -r requirements.txt || true

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest -q

      - name: Lint frontend (placeholder)
        run: echo "Lint frontend..."

      - name: Trivy security scan (placeholder)
        run: echo "Trivy scan would run here"

      - name: Auto-changelog (placeholder)
        run: echo "Generate changelog"

      - name: Auto-version tag
        if: success()
        run: |
          echo "v$(date +%Y%m%d%H%M%S)" > VERSION
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add VERSION
          git commit -m "chore: bump version [skip ci]" || true
          git tag -a "ci-$(date +%s)" -m "ci auto-tag" || true

