name: Version Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Semantic version bump (major/minor/patch)'
        required: true
        default: 'patch'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Get current version
        id: current_version
        run: |
          # Read version from VERSION file or default
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new_version
        run: |
          python3 << 'EOF'
          import sys
          current = "${{ steps.current_version.outputs.version }}"
          parts = current.lstrip('v').split('.')
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          
          bump = "${{ github.event.inputs.bump_type }}"
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1
          
          new_version = f"v{major}.{minor}.{patch}"
          print(f"::set-output name=version::{new_version}")
          print(f"New version: {new_version}")
          EOF

      - name: Auto-generate changelog
        run: |
          mkdir -p docs/releases
          cat > docs/releases/CHANGELOG.md << 'EOF'
          # Changelog
          
          ## [${{ steps.new_version.outputs.version }}] - $(date +%Y-%m-%d)
          ### Added
          - ML training pipeline automation
          - Model registry and versioning
          - GitHub Actions CI/CD
          - Blue/Green deployment strategy
          - Cost monitoring and scaling rules
          
          ### Fixed
          - Improved rate limiting
          - Enhanced error handling
          
          ### Security
          - Added encryption model documentation
          - Implemented SOC2 compliance checklist
          
          EOF

      - name: Generate release notes
        run: |
          mkdir -p docs/releases
          cat > docs/releases/${{ steps.new_version.outputs.version }}.md << 'EOF'
          # Release ${{ steps.new_version.outputs.version }}
          
          Date: $(date)
          
          ## Summary
          This release includes Stage 5 infrastructure hardening with automated ML retraining, CI/CD pipelines, and deployment automation.
          
          ## Features
          - Automated ML model retraining every 7 days
          - Model registry with versioning and rollback
          - GitHub Actions CI/CD pipelines
          - Blue/Green production deployments
          - Cost monitoring and autoscaling
          
          ## Breaking Changes
          None
          
          ## Migration Notes
          No migration required.
          
          EOF

      - name: Tag version
        run: |
          git config user.email "ci@pulsetrak.ai"
          git config user.name "PulseTrakAI CI"
          git tag -a ${{ steps.new_version.outputs.version }} -m "Release ${{ steps.new_version.outputs.version }}"
          git push origin ${{ steps.new_version.outputs.version }} || echo "Tag push skipped (may require push permission)"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.new_version.outputs.version }}
          release_name: Release ${{ steps.new_version.outputs.version }}
          body: |
            **Version**: ${{ steps.new_version.outputs.version }}
            **Date**: $(date)
            
            See [Release Notes](docs/releases/${{ steps.new_version.outputs.version }}.md) for details.
          draft: false
          prerelease: false

