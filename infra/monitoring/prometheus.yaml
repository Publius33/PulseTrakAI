apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'pulsetrak-backend'
        metrics_path: /metrics
        static_configs:
          - targets: ['backend:8000']
      - job_name: 'ml-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['ml-service:8080']

# Prometheus scaffold supporting metrics for ML predictions, pulse horizon, and rate-limiting.

