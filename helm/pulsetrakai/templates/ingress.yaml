apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pulsetrakai.fullname" . }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  rules:
    - host: app.pulsetrak.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsetrakai.fullname" . }}-backend-svc
                port:
                  number: 8000
  tls:
    - hosts:
        - app.pulsetrak.ai
      secretName: pulsetrakai-tls

