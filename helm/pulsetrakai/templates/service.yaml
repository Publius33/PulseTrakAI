apiVersion: v1
kind: Service
metadata:
  name: {{ include "pulsetrakai.fullname" . }}-backend-svc
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "pulsetrakai.fullname" . }}-ml-svc
spec:
  type: ClusterIP
  selector:
    app: ml-service
  ports:
    - port: 8080
      targetPort: 8080

