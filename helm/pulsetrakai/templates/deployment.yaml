apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pulsetrakai.fullname" . }}-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

---
# ML service deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pulsetrakai.fullname" . }}-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: "{{ .Values.image.ml_service.repository }}:{{ .Values.image.ml_service.tag }}"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1024Mi
            limits:
              cpu: 2000m
              memory: 4096Mi

        ---
        # Frontend deployment
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{ include "pulsetrakai.fullname" . }}-frontend
        spec:
          replicas: {{ .Values.replicaCount }}
          selector:
            matchLabels:
              app: frontend
          template:
            metadata:
              labels:
                app: frontend
            spec:
              containers:
                - name: frontend
                  image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
                  ports:
                    - containerPort: 80
                  resources:
                    requests:
                      cpu: {{ .Values.resources.requests.cpu }}
                      memory: {{ .Values.resources.requests.memory }}
                    limits:
                      cpu: {{ .Values.resources.limits.cpu }}
                      memory: {{ .Values.resources.limits.memory }}

