apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pulsetrakai.fullname" . }}-config
data:
  # Example environment values to be injected into pods via envFrom
  APP_ENV: "{{ .Values.config.env.APP_ENV | default "staging" }}"
  API_URL: "{{ .Values.config.env.API_URL | default "https://api.pulsetrak.ai" }}"

